services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq-prod
    ports:
      - "5671:5671"
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
      - ./certs:/etc/rabbitmq/ssl:ro
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messaging-prod
    restart: unless-stopped

  server:
    image: messaging-server:prod
    container_name: server-prod
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://admin:changeme@rabbitmq:5672/}
      QUEUE_NAME: ${QUEUE_NAME:-messages}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - messaging-prod
    restart: unless-stopped

  client:
    image: messaging-client:prod
    container_name: client-prod
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://admin:changeme@rabbitmq:5672/}
      QUEUE_NAME: ${QUEUE_NAME:-messages}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - messaging-prod
    restart: unless-stopped

networks:
  messaging-prod:
    driver: bridge

volumes:
  rabbitmq_prod_data:
